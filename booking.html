<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snazzy Paws Grooming | Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <nav>
        <div class="logo">
        <img src="images/logo.png" alt="Logo">
    </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="booking.html" class="active">Booking</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>
<section class="booking">
    <h2>Book a Grooming Appointment</h2>
    <form>
        <label for="owner">Owner's Name</label>
        <input type="text" id="owner" required>
        <label for="email">Email Address</label>
        <input type="email" id="email" required>
        <label for="dogname">Dog's Name</label>
        <input type="text" id="dogname" required>
        <label for="breed">Breed</label>
        <input type="text" id="breed" required>
        <label for="age">Dog Age</label>
        <input type="number" id="age" min="0">
        <button type="submit">Submit Booking</button>
    </form>
</section>
<footer>
    <p>Snazzy Paws Grooming — Open Monday to Saturday, 9am–5pm</p>
    <div class="social">
        <img src="images/facebook.png" alt="Facebook">
        <img src="images/instagram.png" alt="Instagram">
    </div>
</footer>
</body>
</html>
